basePath: /
definitions:
  api.WebSocketMessage:
    properties:
      text:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API for video frame streaming and processing via WebSocket and video
    upload
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Video Streaming API
  version: "1.0"
paths:
  /health:
    get:
      description: Check if the API is running and healthy
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Health check endpoint
      tags:
      - health
  /socket:
    get:
      consumes:
      - application/octet-stream
      description: |-
        Establishes a WebSocket connection for receiving video frames. Send binary frames to the server, and receive text responses back.

        **Client Flow:**
        1. Connect to the WebSocket endpoint (ws://localhost:8080/socket)
        2. Send video frames as binary messages (MessageBinary)
        3. Server buffers frames and sends batches of 32 to processing API
        4. Receive text responses as JSON messages (MessageText)

        **Response Format:**
        The server sends back JSON text messages with the structure:
        ```json
        {
        "text": "extracted or processed text from the frames"
        }
        ```

        **Frontend Example:**
        ```javascript
        const ws = new WebSocket('ws://localhost:8080/socket');

        // Send binary frame data
        ws.send(frameDataBlob);

        // Receive text messages
        ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        console.log('Received text:', data.text);
        };
        ```
      produces:
      - application/json
      responses:
        "101":
          description: WebSocket response with extracted text
          schema:
            $ref: '#/definitions/api.WebSocketMessage'
        "400":
          description: Bad Request - Failed to accept websocket
          schema:
            type: string
      summary: WebSocket endpoint for video frame streaming
      tags:
      - websocket
  /upload:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Upload a video file, extract frames, and process them in batches of 32 frames. Unlike the WebSocket endpoint, this processes the entire video at once and returns a summary.

        **Process Flow:**
        1. Upload video file via multipart form data
        2. Server extracts frames from the video
        3. Frames are split into batches of 32
        4. Each batch is sent sequentially to the processing API
        5. Returns processing summary with statistics

        **Response Format:**
        ```json
        {
        "status": "completed",
        "total_frames": 250,
        "total_batches": 8,
        "successful_batches": 8,
        "video_info": {
        "fps": 25.0,
        "duration": 10.0,
        "frame_width": 1920,
        "frame_height": 1080,
        "estimated_frames": 250
        }
        }
        ```

        **Frontend Example:**
        ```javascript
        const formData = new FormData();
        formData.append('video', videoFile);
        formData.append('interval', '1'); // Optional: extract every Nth frame

        const response = await fetch('http://localhost:8080/upload', {
        method: 'POST',
        body: formData
        });

        const result = await response.json();
        console.log('Processing completed:', result);
        ```
      parameters:
      - description: Video file to process
        in: formData
        name: video
        required: true
        type: file
      - description: 'Frame extraction interval (default: 1, extract every frame)'
        in: formData
        name: interval
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Processing result with status and metadata
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request - Invalid file or format
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upload video for frame-by-frame processing
      tags:
      - video
schemes:
- http
- ws
swagger: "2.0"
