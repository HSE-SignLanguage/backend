basePath: /
definitions:
  api.WebSocketMessage:
    properties:
      text:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API for video frame streaming and processing via WebSocket and video
    upload
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Video Streaming API
  version: "1.0"
paths:
  /health:
    get:
      description: Check if the API is running and healthy
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Health check endpoint
      tags:
      - health
  /socket:
    get:
      consumes:
      - application/octet-stream
      description: Establishes a WebSocket connection for receiving video frames.
        Frames are buffered and sent in batches of 32 to the processing API and the
        resulting text is streamed back to the client as JSON messages
      produces:
      - application/json
      responses:
        "101":
          description: WebSocket response with extracted text
          schema:
            $ref: '#/definitions/api.WebSocketMessage'
        "400":
          description: Bad Request - Failed to accept websocket
          schema:
            type: string
      summary: WebSocket endpoint for video frame streaming
      tags:
      - websocket
  /upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload a video file, extract frames, and process them in batches
        of 32 frames
      parameters:
      - description: Video file to process
        in: formData
        name: video
        required: true
        type: file
      - description: 'Frame extraction interval (default: 1, extract every frame)'
        in: formData
        name: interval
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Processing result with status and metadata
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request - Invalid file or format
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upload video for frame-by-frame processing
      tags:
      - video
schemes:
- http
- ws
swagger: "2.0"
