services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_VERSION: 1.26.5
        TARGETOS: linux
        TARGETARCH: amd64
        BACKEND_PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8080}
      - SWAGGER_BASE_URL=${SWAGGER_BASE_URL:-http://localhost:8080}
      - TRUSTED_PROXY_CIDRS=${TRUSTED_PROXY_CIDRS:-}
      - ML_API_URL=${ML_API_URL}
      - USE_MOCK=${USE_MOCK:-false}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - USE_OPENROUTER=${USE_OPENROUTER:-true}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /app/tmp:rw,noexec,nosuid,size=256m,uid=10001,gid=10001,mode=0700
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 35s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:$${BACKEND_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
