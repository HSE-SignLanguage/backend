services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_VERSION: 1.24.4
        TARGETOS: linux
        TARGETARCH: amd64
        BACKEND_PORT: 8080
      network: default
    ports:
      - "8080:8080"
    environment:
      - BACKEND_PORT=${BACKEND_PORT}
      - DEMO_API_URL=${DEMO_API_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    driver: bridge