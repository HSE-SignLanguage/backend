name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.5"

jobs:
  quality:
    name: Format and static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(git ls-files -z '*.go' | xargs -0 gofmt -l)"
          if [[ -n "${unformatted}" ]]; then
            echo "The following files need gofmt:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Check module files
        run: go mod tidy -diff

      - name: Run go vet
        run: go vet ./...

  test:
    name: Unit and integration-style tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true

      - name: Run tests with race detector
        run: >-
          go test -race -shuffle=on -count=1 -skip Integration
          -covermode=atomic -coverprofile=coverage.out ./...

      - name: Print coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage profile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 7

  build:
    name: Build production binary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true

      - name: Build Linux binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/backend .
          go version -m dist/backend

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-linux-amd64
          path: dist/backend
          if-no-files-found: error
          retention-days: 7

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run govulncheck
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          go-version-input: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true
          cache-dependency-path: go.sum
          go-package: ./...
          repo-checkout: false

      - name: Verify downloaded modules
        run: go mod verify

  container-security:
    name: Container build, scan and SBOM
    needs:
      - quality
      - test
      - build
      - dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_REF: hse-signlanguage-backend:ci-${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build container image
        id: image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          pull: true
          push: false
          tags: ${{ env.IMAGE_REF }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          provenance: false

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.72.0
          cache: true

      - name: Scan Dockerfile configuration
        run: >-
          trivy config --severity HIGH,CRITICAL --exit-code 1
          --skip-version-check Dockerfile

      - name: Scan image for high and critical findings
        run: >-
          trivy image --scanners vuln,secret --severity HIGH,CRITICAL
          --exit-code 1 --no-progress --skip-version-check "${IMAGE_REF}"

      - name: Generate CycloneDX SBOM
        id: sbom
        if: ${{ always() && steps.image.outcome == 'success' }}
        run: >-
          trivy image --format cyclonedx --output sbom.cdx.json
          --no-progress --skip-version-check "${IMAGE_REF}"

      - name: Upload SBOM
        if: ${{ always() && steps.sbom.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-sbom
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 14
